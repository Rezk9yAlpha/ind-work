<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KursaWork Mini App</title>
    <link rel="stylesheet" href="./style.css?v=1.1" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="container">
      <h1>KursaWork ✨</h1>
      <p class="subtitle">Сопровождение учебных работ и проектов 🎓</p>

      <section class="card">
        <h2>📂 Категории и цены</h2>
        <button class="item" data-type="Индивидуальный проект" data-price="от 3 500 ₽">
          <span>💎 Индивидуальный проект</span>
          <strong>от 3 500 ₽</strong>
        </button>
        <button class="item" data-type="Курсовой проект" data-price="от 2 500 ₽">
          <span>📝 Курсовой проект</span>
          <strong>от 2 500 ₽</strong>
        </button>
        <button class="item" data-type="Реферат" data-price="от 900 ₽">
          <span>📄 Реферат</span>
          <strong>от 900 ₽</strong>
        </button>
      </section>

      <section class="card">
        <h2>✍️ Описание задачи</h2>
        <textarea id="task" placeholder="Напишите тему, объем и желаемый дедлайн..."></textarea>
        
        <div class="file-upload">
          <input type="file" id="fileInput" multiple hidden />
          <button id="fileBtn" class="secondary">📎 Прикрепить файлы</button>
          <div id="fileList" class="file-list"></div>
        </div>

        <button id="sendBtn" class="primary">Отправить заявку 🚀</button>
      </section>
    </main>

    <script src="./app.js?v=1.1"></script>
  </body>
</html>
