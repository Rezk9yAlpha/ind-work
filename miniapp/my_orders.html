<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Мои заказы</title>
    <link rel="stylesheet" href="./style.css?v=2.6" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="container">
      <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
        <button id="back-btn-header" style="background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px;">
          ←
        </button>
        <h1 style="margin: 0; font-size: 24px;">📋 Мои заказы</h1>
      </div>
      <div id="orders-list"></div>
      <div id="no-orders" style="display: none; text-align: center; padding: 40px 20px;">
        <p style="font-size: 16px; color: var(--text-secondary);">У вас пока нет заказов.</p>
        <button id="back-to-main" class="primary">Сделать первый заказ</button>
      </div>
    </main>
    <script src="./my_orders.js?v=2.6"></script>
  </body>
</html>
